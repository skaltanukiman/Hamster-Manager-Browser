services:
  app:
    container_name: hamster-manager-web
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ${ENV_FILE:-.env}
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    container_name: hamster-manager-db
    image: postgres:16-alpine
    env_file:
      - ${ENV_FILE:-.env}
    volumes:
      - hamster_manager_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  hamster_manager_pgdata:
